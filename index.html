<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F8F7F4">
<title>⚡ Signal Engine v9.4</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–bg: #F8F7F4;
–white: #FFFFFF;
–card: #FFFFFF;
–border: #E8E6E0;
–border2: #F2F1ED;
–text: #18181A;
–text2: #6B6860;
–text3: #B0AEA8;
–green: #0F6B3E;
–green-bg: #EDFAF3;
–green-bd: #A8E6C3;
–green-glow: #22C76E;
–blue: #1247C2;
–blue-bg: #EDF2FF;
–blue-bd: #B8CEFA;
–red: #BE2118;
–red-bg: #FEF1F0;
–red-bd: #F5BAB7;
–amber: #96460A;
–amber-bg: #FFF6EC;
–amber-bd: #F5CFA0;
–purple: #6B30C8;
–purple-bg: #F4F0FF;
–purple-bd: #CDBEF8;
–gold: #C49A00;
–shadow-xs: 0 1px 2px rgba(0,0,0,0.05);
–shadow-sm: 0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
–shadow-md: 0 8px 24px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
–shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
–r: 16px;
–r-sm: 10px;
–r-xs: 7px;
–font: ‘Outfit’, sans-serif;
–mono: ‘JetBrains Mono’, monospace;
}

body {
font-family: var(–font);
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
padding-bottom: 90px;
-webkit-font-smoothing: antialiased;
}

/* ── TOPBAR ── */
.topbar {
background: rgba(248,247,244,0.92);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-bottom: 1px solid var(–border);
padding: 14px 16px 12px;
position: sticky;
top: 0;
z-index: 200;
}

.topbar-row1 {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 12px;
}

.app-brand {
display: flex;
align-items: center;
gap: 8px;
}

.brand-icon {
width: 32px; height: 32px;
background: linear-gradient(135deg, #F59E0B, #EF4444);
border-radius: 9px;
display: flex; align-items: center; justify-content: center;
font-size: 16px;
box-shadow: 0 2px 8px rgba(239,68,68,0.3);
}

.brand-name {
font-size: 17px;
font-weight: 800;
color: var(–text);
letter-spacing: -0.5px;
}

.brand-ver {
font-family: var(–mono);
font-size: 9px;
background: var(–blue-bg);
color: var(–blue);
padding: 2px 6px;
border-radius: 20px;
font-weight: 600;
border: 1px solid var(–blue-bd);
}

.live-pill {
display: flex;
align-items: center;
gap: 6px;
background: var(–white);
border: 1px solid var(–border);
border-radius: 20px;
padding: 5px 10px 5px 7px;
box-shadow: var(–shadow-xs);
}

.live-dot {
width: 7px; height: 7px;
border-radius: 50%;
background: var(–green-glow);
box-shadow: 0 0 8px var(–green-glow);
flex-shrink: 0;
}
.live-dot.error { background: #EF4444; box-shadow: 0 0 8px #EF4444; }
.live-dot.updating { background: #F59E0B; box-shadow: 0 0 8px #F59E0B; }

.live-text {
font-family: var(–mono);
font-size: 10px;
font-weight: 600;
color: var(–text2);
letter-spacing: 0.5px;
}

/* ── BALANCE WIDGET ── */
.balance-widget {
background: linear-gradient(135deg, #18181A 0%, #2D2D30 100%);
border-radius: var(–r-sm);
padding: 12px 14px;
display: flex;
align-items: center;
justify-content: space-between;
cursor: pointer;
position: relative;
overflow: hidden;
}

.balance-widget::before {
content: ‘’;
position: absolute;
top: -30px; right: -20px;
width: 80px; height: 80px;
background: radial-gradient(circle, rgba(34,199,110,0.15) 0%, transparent 70%);
pointer-events: none;
}

.balance-left { display: flex; flex-direction: column; gap: 2px; }

.balance-lbl {
font-size: 10px;
font-weight: 600;
color: rgba(255,255,255,0.4);
letter-spacing: 1px;
text-transform: uppercase;
}

.balance-amount {
font-family: var(–mono);
font-size: 22px;
font-weight: 600;
color: #FFFFFF;
letter-spacing: -0.5px;
line-height: 1;
}

.balance-amount.placeholder {
font-size: 14px;
color: rgba(255,255,255,0.3);
font-weight: 400;
}

.balance-edit-btn {
display: flex;
align-items: center;
gap: 5px;
background: rgba(255,255,255,0.1);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 8px;
padding: 7px 12px;
color: rgba(255,255,255,0.8);
font-family: var(–font);
font-size: 12px;
font-weight: 600;
cursor: pointer;
transition: background 0.15s;
flex-shrink: 0;
}
.balance-edit-btn:active { background: rgba(255,255,255,0.2); }

/* Balance input overlay */
.balance-input-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.6);
z-index: 300;
align-items: flex-end;
backdrop-filter: blur(4px);
}
.balance-input-overlay.open { display: flex; }

.balance-input-sheet {
background: var(–white);
border-radius: 24px 24px 0 0;
padding: 24px 20px 40px;
width: 100%;
animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
}

.sheet-handle { width: 40px; height: 4px; background: var(–border); border-radius: 2px; margin: 0 auto 20px; }

.sheet-title { font-size: 20px; font-weight: 800; color: var(–text); margin-bottom: 4px; letter-spacing: -0.5px; }
.sheet-sub { font-size: 13px; color: var(–text3); margin-bottom: 20px; }

.big-input-wrap { position: relative; margin-bottom: 16px; }
.big-input-prefix {
position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
font-family: var(–mono); font-size: 24px; font-weight: 600; color: var(–text3);
}
.big-input {
width: 100%;
background: var(–bg);
border: 2px solid var(–border);
border-radius: var(–r-sm);
font-family: var(–mono);
font-size: 28px;
font-weight: 600;
color: var(–text);
padding: 16px 16px 16px 40px;
outline: none;
transition: border-color 0.2s;
}
.big-input:focus { border-color: var(–blue); }

.quick-amounts {
display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
}
.quick-amt {
flex: 1; min-width: 60px;
background: var(–bg);
border: 1.5px solid var(–border);
border-radius: var(–r-xs);
font-family: var(–mono);
font-size: 13px;
font-weight: 600;
color: var(–text2);
padding: 9px 4px;
text-align: center;
cursor: pointer;
transition: all 0.15s;
}
.quick-amt:active, .quick-amt.sel {
background: var(–text);
color: white;
border-color: var(–text);
}

.save-balance-btn {
width: 100%;
background: linear-gradient(135deg, #18181A, #2D2D30);
color: white;
border: none;
border-radius: var(–r-sm);
font-family: var(–font);
font-size: 16px;
font-weight: 700;
padding: 16px;
cursor: pointer;
letter-spacing: -0.3px;
}

/* ── MARKET BANNER ── */
.market-banner {
padding: 9px 16px;
font-size: 12px;
font-weight: 700;
text-align: center;
letter-spacing: 0.2px;
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
}
.mb-bull { background: var(–green-bg); color: var(–green); border-bottom: 1px solid var(–green-bd); }
.mb-neutral { background: var(–amber-bg); color: var(–amber); border-bottom: 1px solid var(–amber-bd); }
.mb-bear { background: var(–red-bg); color: var(–red); border-bottom: 1px solid var(–red-bd); }

/* ── FILTER ROW ── */
.filter-row {
display: flex;
gap: 7px;
padding: 10px 14px;
background: var(–white);
border-bottom: 1px solid var(–border);
overflow-x: auto;
scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.f-btn {
white-space: nowrap;
padding: 6px 14px;
border-radius: 20px;
font-family: var(–font);
font-size: 12px;
font-weight: 700;
border: 1.5px solid var(–border);
background: transparent;
color: var(–text2);
cursor: pointer;
transition: all 0.15s;
letter-spacing: -0.2px;
}
.f-btn.active { background: var(–text); color: #fff; border-color: var(–text); }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; }

/* ── SIGNAL CARDS ── */
.signals-wrap { padding: 14px 14px 8px; }

.refresh-bar {
text-align: center;
padding: 6px;
font-size: 11px;
color: var(–text3);
font-family: var(–mono);
}

.loading-state {
display: flex; flex-direction: column;
align-items: center; justify-content: center;
padding: 70px 20px; gap: 16px;
}
.loader-ring {
width: 44px; height: 44px;
border: 3px solid var(–border2);
border-top-color: var(–blue);
border-radius: 50%;
animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-title { font-size: 15px; font-weight: 700; color: var(–text); letter-spacing: -0.3px; }
.loading-sub { font-size: 12px; color: var(–text3); font-family: var(–mono); }

.error-state {
margin: 16px;
background: var(–red-bg);
border: 1.5px solid var(–red-bd);
border-radius: var(–r);
padding: 20px;
text-align: center;
}
.error-title { font-size: 15px; font-weight: 700; color: var(–red); margin-bottom: 6px; }
.error-sub { font-size: 12px; color: var(–text2); margin-bottom: 16px; line-height: 1.5; }
.retry-btn {
background: var(–red);
color: white;
border: none;
border-radius: var(–r-xs);
font-family: var(–font);
font-size: 13px;
font-weight: 700;
padding: 10px 24px;
cursor: pointer;
}

.empty-state { text-align: center; padding: 50px 20px; color: var(–text3); font-size: 14px; font-weight: 500; }

/* Section header */
.section-hd {
display: flex; align-items: center; gap: 10px;
padding: 4px 0 10px;
}
.section-hd-line { flex: 1; height: 1px; background: var(–border); }
.section-hd-txt {
font-size: 10px; font-weight: 800; color: var(–text3);
letter-spacing: 1.2px; text-transform: uppercase; white-space: nowrap;
}

.watch-note {
background: var(–purple-bg);
border: 1px solid var(–purple-bd);
border-radius: var(–r-xs);
padding: 8px 12px;
font-size: 11px;
color: var(–purple);
font-weight: 600;
text-align: center;
margin-bottom: 10px;
}

/* THE CARD */
.sig-card {
background: var(–card);
border-radius: var(–r);
border: 1.5px solid var(–border);
margin-bottom: 12px;
overflow: hidden;
box-shadow: var(–shadow-sm);
animation: cardIn 0.3s ease both;
}
@keyframes cardIn { from { opacity: 0; transform: translateY(8px); } }

.sig-card.card-strong { border-color: var(–green-bd); }
.sig-card.card-watch { border-color: var(–purple-bd); }

/* Card top strip */
.card-strip {
height: 3px;
width: 100%;
}
.strip-strong { background: linear-gradient(90deg, var(–green), var(–green-glow)); }
.strip-buy { background: linear-gradient(90deg, var(–blue), #60A5FA); }
.strip-watch { background: linear-gradient(90deg, var(–purple), #A78BFA); }

.card-head {
display: flex;
align-items: flex-start;
justify-content: space-between;
padding: 14px 14px 8px;
}

.coin-name {
font-size: 22px;
font-weight: 900;
color: var(–text);
letter-spacing: -0.8px;
line-height: 1;
}
.coin-name span { font-size: 13px; font-weight: 500; color: var(–text3); letter-spacing: 0; }

.coin-change {
font-family: var(–mono);
font-size: 11px;
font-weight: 600;
margin-top: 4px;
}
.chg-pos { color: var(–green); }
.chg-neg { color: var(–red); }
.chg-zero { color: var(–text3); }

.sig-badge {
padding: 6px 12px;
border-radius: 20px;
font-size: 11px;
font-weight: 800;
letter-spacing: 0.3px;
white-space: nowrap;
}
.badge-STRONG_BUY { background: var(–green-bg); color: var(–green); border: 1.5px solid var(–green-bd); }
.badge-BUY { background: var(–blue-bg); color: var(–blue); border: 1.5px solid var(–blue-bd); }
.badge-WATCH { background: var(–purple-bg); color: var(–purple); border: 1.5px solid var(–purple-bd); }

/* Confirm row */
.confirm-row {
display: flex; align-items: center;
justify-content: space-between;
padding: 0 14px 10px;
}
.confirm-tag {
font-size: 11px; font-weight: 700;
display: flex; align-items: center; gap: 4px;
}
.tag-yes { color: var(–green); }
.tag-no { color: var(–amber); }

.score-chip {
font-family: var(–mono);
font-size: 10px;
font-weight: 600;
color: var(–text3);
background: var(–bg);
border: 1px solid var(–border);
border-radius: 20px;
padding: 3px 8px;
}

/* Score bar */
.score-bar-row {
padding: 0 14px 12px;
display: flex; align-items: center; gap: 8px;
}
.score-track {
flex: 1; height: 5px;
background: var(–border2);
border-radius: 3px; overflow: hidden;
}
.score-fill { height: 100%; border-radius: 3px; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }

/* Price grid */
.card-div { height: 1px; background: var(–border2); margin: 0 14px; }

.price-grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
padding: 12px 14px;
gap: 0;
}
.price-cell { text-align: center; }
.price-lbl {
font-size: 9px; font-weight: 800;
color: var(–text3); letter-spacing: 0.8px;
text-transform: uppercase; margin-bottom: 4px;
}
.price-val {
font-family: var(–mono);
font-size: 12px; font-weight: 600;
}
.pv-buy { color: var(–green); }
.pv-sell { color: var(–blue); }
.pv-sl { color: var(–red); }

/* Card footer */
.card-foot {
background: var(–bg);
border-top: 1px solid var(–border2);
padding: 12px 14px;
display: flex; align-items: center; justify-content: space-between;
gap: 10px;
}

.foot-left { flex: 1; }

.foot-row {
display: flex; align-items: center; gap: 8px;
margin-bottom: 4px;
}
.foot-row:last-child { margin-bottom: 0; }

.foot-lbl {
font-size: 10px; font-weight: 700;
color: var(–text3); letter-spacing: 0.5px;
min-width: 50px;
}
.foot-val {
font-family: var(–mono); font-size: 13px;
font-weight: 600; color: var(–text);
}
.foot-profit { color: var(–green); }

.trade-btn {
border: none; border-radius: var(–r-sm);
font-family: var(–font); font-size: 13px;
font-weight: 800; cursor: pointer;
transition: all 0.15s; letter-spacing: -0.2px;
padding: 0 18px; height: 52px;
display: flex; align-items: center; justify-content: center;
flex-direction: column; gap: 1px;
flex-shrink: 0; min-width: 80px;
}
.trade-btn .btn-main { font-size: 13px; font-weight: 800; }
.trade-btn .btn-sub { font-size: 9px; font-weight: 600; opacity: 0.7; letter-spacing: 0.3px; }

.btn-strong {
background: linear-gradient(135deg, var(–green), #16A349);
color: white;
box-shadow: 0 4px 14px rgba(15,107,62,0.3);
}
.btn-buy {
background: linear-gradient(135deg, var(–blue), #2563EB);
color: white;
box-shadow: 0 4px 14px rgba(18,71,194,0.25);
}
.btn-watch {
background: linear-gradient(135deg, var(–purple), #7C3AED);
color: white;
box-shadow: 0 4px 14px rgba(107,48,200,0.25);
}
.trade-btn:active { transform: scale(0.96); }

/* ── TABS ── */
.tabs-bar {
position: fixed; bottom: 0; left: 0; right: 0;
background: rgba(255,255,255,0.95);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-top: 1px solid var(–border);
display: flex; z-index: 200;
padding-bottom: env(safe-area-inset-bottom, 0);
box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.tab-btn {
flex: 1; padding: 10px 4px 8px;
display: flex; flex-direction: column;
align-items: center; gap: 3px;
font-size: 10px; font-weight: 700;
color: var(–text3); cursor: pointer;
border: none; background: none;
transition: color 0.15s;
letter-spacing: 0.5px;
position: relative;
}
.tab-btn.active { color: var(–blue); }
.tab-btn.active::before {
content: ‘’;
position: absolute; top: 0; left: 50%; transform: translateX(-50%);
width: 32px; height: 2px;
background: var(–blue);
border-radius: 0 0 2px 2px;
}
.tab-icon { font-size: 22px; line-height: 1; }

/* ── TRACKER ── */
.tracker-wrap { padding: 14px; }

.trade-card {
background: var(–card);
border-radius: var(–r);
border: 1.5px solid var(–border);
margin-bottom: 12px;
overflow: hidden;
box-shadow: var(–shadow-sm);
}

.tc-head {
display: flex; justify-content: space-between;
align-items: flex-start; padding: 14px 14px 10px;
}
.tc-coin { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: var(–text); }
.tc-meta { font-size: 10px; color: var(–text3); margin-top: 3px; font-family: var(–mono); }

.tc-status {
font-size: 10px; font-weight: 800;
padding: 5px 10px; border-radius: 20px; letter-spacing: 0.5px;
}
.st-OPEN { background: var(–amber-bg); color: var(–amber); border: 1px solid var(–amber-bd); }
.st-WIN { background: var(–green-bg); color: var(–green); border: 1px solid var(–green-bd); }
.st-LOSS { background: var(–red-bg); color: var(–red); border: 1px solid var(–red-bd); }

.tc-grid { display: grid; grid-template-columns: repeat(3,1fr); padding: 6px 14px 12px; }
.tc-cell { text-align: center; }
.tc-cell-lbl { font-size: 9px; color: var(–text3); font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 3px; }
.tc-cell-val { font-family: var(–mono); font-size: 12px; font-weight: 600; color: var(–text); }

.tc-foot {
background: var(–bg); border-top: 1px solid var(–border2);
padding: 12px 14px;
display: flex; align-items: center; justify-content: space-between;
}
.tc-pnl { font-family: var(–mono); font-size: 20px; font-weight: 700; }
.pnl-p { color: var(–green); }
.pnl-n { color: var(–red); }
.pnl-z { color: var(–text3); }

.tc-acts { display: flex; gap: 8px; }
.btn-close {
background: var(–white); border: 1.5px solid var(–border);
color: var(–text); font-family: var(–font); font-size: 12px;
font-weight: 700; padding: 8px 16px; border-radius: var(–r-xs); cursor: pointer;
}
.btn-del {
background: var(–red-bg); border: 1.5px solid var(–red-bd);
color: var(–red); font-size: 14px; padding: 8px 12px;
border-radius: var(–r-xs); cursor: pointer;
}

/* ── STATS ── */
.stats-wrap { padding: 14px; }

.hero-card {
background: linear-gradient(135deg, #18181A 0%, #2A2A2D 100%);
border-radius: var(–r);
padding: 20px;
margin-bottom: 12px;
position: relative; overflow: hidden;
}
.hero-card::before {
content: ‘’;
position: absolute; top: -40px; right: -30px;
width: 160px; height: 160px;
background: radial-gradient(circle, rgba(34,199,110,0.12) 0%, transparent 70%);
}
.hero-lbl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px; }
.hero-pnl { font-family: var(–mono); font-size: 36px; font-weight: 700; line-height: 1; margin-bottom: 16px; letter-spacing: -1.5px; }

.wr-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.wr-lbl { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 500; }
.wr-val { font-family: var(–mono); font-size: 14px; font-weight: 700; color: white; }
.wr-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
.wr-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(–green-glow), #86EFAC); transition: width 0.8s ease; }

.hero-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.hero-box {
background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.08);
border-radius: var(–r-xs); padding: 10px 8px; text-align: center;
}
.hero-box-val { font-family: var(–mono); font-size: 18px; font-weight: 700; color: white; }
.hero-box-lbl { font-size: 9px; color: rgba(255,255,255,0.35); font-weight: 600; margin-top: 2px; letter-spacing: 0.5px; }

.info-card {
background: var(–card); border-radius: var(–r);
border: 1.5px solid var(–border); padding: 16px;
margin-bottom: 12px; box-shadow: var(–shadow-sm);
}

<script>
// ═══════════════════════════
// CONFIG
// ═══════════════════════════
const SYMBOLS = [
  'BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT',
  'ADAUSDT','AVAXUSDT','DOGEUSDT','MATICUSDT','LINKUSDT',
  'DOTUSDT','LTCUSDT','UNIUSDT','ATOMUSDT','NEARUSDT',
  'INJUSDT','ARBUSDT','OPUSDT','SUIUSDT','APTUSDT'
];
const T = { STRONG_BUY: 8, BUY: 5, WATCH: 3 };
const MIN_TRADE = 1; // ✅ lowered minimum

let signals=[], trades=[], balance=0;
let currentFilter='ALL', currentTab='signals';
let activeTradeId=null, marketStatus='BULL';
let refreshTimer=null, lastRefresh=0;
let hasError=false;

// ═══════════════════════════
// STORAGE
// ═══════════════════════════
function loadState() {
  try {
    trades = JSON.parse(localStorage.getItem('se94_trades') || '[]');
    balance = parseFloat(localStorage.getItem('se94_balance') || '0');
    if (balance > 0) updateBalanceDisplay();
  } catch(e) { trades=[]; balance=0; }
}
function saveState() {
  localStorage.setItem('se94_trades', JSON.stringify(trades));
  localStorage.setItem('se94_balance', balance.toString());
}

// ═══════════════════════════
// BALANCE — tap to edit
// ═══════════════════════════
function openBalanceSheet() {
  document.getElementById('balanceSheetInput').value = balance > 0 ? balance : '';
  document.getElementById('balanceOverlay').classList.add('open');
  setTimeout(() => document.getElementById('balanceSheetInput').focus(), 300);
}
function closeBalanceSheet() {
  document.getElementById('balanceOverlay').classList.remove('open');
}
function onSheetBalanceInput() {
  // clear quick select highlights
  document.querySelectorAll('.quick-amt').forEach(q=>q.classList.remove('sel'));
}
function setQuick(val) {
  document.getElementById('balanceSheetInput').value = val;
  document.querySelectorAll('.quick-amt').forEach(q=>{
    q.classList.toggle('sel', parseFloat(q.textContent.replace(/[^0-9]/g,'')) === val ||
      (q.textContent.includes('K') && val === parseFloat(q.textContent)*1000));
  });
}
function saveBalance() {
  const val = parseFloat(document.getElementById('balanceSheetInput').value);
  if (isNaN(val) || val <= 0) { alert('Please enter a valid balance.'); return; }
  balance = val;
  saveState();
  updateBalanceDisplay();
  closeBalanceSheet();
  if (signals.length > 0) renderSignals(); // recalculate position sizes
}
function updateBalanceDisplay() {
  const el = document.getElementById('balanceDisplay');
  if (balance > 0) {
    el.textContent = '$' + balance.toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2});
    el.classList.remove('placeholder');
  } else {
    el.textContent = 'Tap to set balance';
    el.classList.add('placeholder');
  }
}
function updateBalanceLive(delta) {
  balance += delta;
  if (balance < 0) balance = 0;
  saveState();
  updateBalanceDisplay();
}

// Close balance overlay on outside tap
document.getElementById('balanceOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeBalanceSheet();
});

// ═══════════════════════════
// MATH
// ═══════════════════════════
function calcEMA(closes, period) {
  if (closes.length < period) return null;
  const k = 2/(period+1);
  let ema = closes.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for (let i=period; i<closes.length; i++) ema = closes[i]*k + ema*(1-k);
  return ema;
}
function calcRSI(closes, period=14) {
  if (closes.length < period+1) return 50;
  let g=0, l=0;
  for (let i=closes.length-period; i<closes.length; i++) {
    const d=closes[i]-closes[i-1]; d>0?g+=d:l-=d;
  }
  const ag=g/period, al=l/period;
  return al===0 ? 100 : 100-100/(1+ag/al);
}
function calcMACD(closes) {
  const e12=calcEMA(closes,12), e26=calcEMA(closes,26);
  if (!e12||!e26) return {macd:0,signal:0};
  const macd=e12-e26;
  return {macd, signal:macd*0.85};
}
function calcBB(closes, period=20) {
  if (closes.length<period) return null;
  const sl=closes.slice(-period);
  const mean=sl.reduce((a,b)=>a+b,0)/period;
  const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/period);
  return {upper:mean+2*std, lower:mean-2*std, mid:mean};
}
function calcATR(highs,lows,closes,period=14) {
  if (closes.length<period+1) return null;
  let trs=[];
  for (let i=closes.length-period; i<closes.length; i++) {
    trs.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])));
  }
  return trs.reduce((a,b)=>a+b,0)/period;
}
function calcADX(highs,lows,closes,period=14) {
  if (closes.length<period+2) return {adx:15,diPlus:10,diMinus:10};
  let dmP=[],dmM=[],tr=[];
  for (let i=1;i<closes.length;i++) {
    const um=highs[i]-highs[i-1], dm=lows[i-1]-lows[i];
    dmP.push(um>dm&&um>0?um:0); dmM.push(dm>um&&dm>0?dm:0);
    tr.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])));
  }
  const atr=tr.slice(-period).reduce((a,b)=>a+b,0)/period;
  if (atr===0) return {adx:15,diPlus:10,diMinus:10};
  const dip=(dmP.slice(-period).reduce((a,b)=>a+b,0)/period/atr)*100;
  const dim=(dmM.slice(-period).reduce((a,b)=>a+b,0)/period/atr)*100;
  return {adx:Math.abs(dip-dim)/(dip+dim+0.001)*100, diPlus:dip, diMinus:dim};
}
function calcVolRatio(volumes) {
  if (volumes.length<20) return 1;
  const avg=volumes.slice(-20).reduce((a,b)=>a+b,0)/20;
  return avg>0?volumes[volumes.length-1]/avg:1;
}

// ═══════════════════════════
// SCORING
// ═══════════════════════════
function scoreSignal(ind, price) {
  let s=0;
  const {rsi,macd,ema9,ema21,ema50,bb,adx,change,volRatio}=ind;
  if (rsi<35) s+=2; else if (rsi<45) s+=1; else if (rsi>70) s-=2; else if (rsi>60) s-=1;
  if (macd.macd>0&&macd.macd>macd.signal) s+=2; else if (macd.macd>0) s+=1;
  else if (macd.macd<0&&macd.macd<macd.signal) s-=2; else if (macd.macd<0) s-=1;
  if (ema9&&ema21&&ema50) {
    if (price>ema9&&ema9>ema21&&ema21>ema50) s+=2;
    else if (price>ema21&&ema21>ema50) s+=1;
    else if (price<ema21) s-=1;
    if (price<ema9&&ema9<ema21&&ema21<ema50) s-=2;
  }
  if (bb) {
    if (price<bb.lower) s+=2; else if (price<bb.mid) s+=1;
    else if (price>bb.upper) s-=2; else if (price>bb.upper*0.99) s-=1;
  }
  if (adx.adx>25&&adx.diPlus>adx.diMinus) s+=2;
  else if (adx.adx>20&&adx.diPlus>adx.diMinus) s+=1;
  else if (adx.adx>25&&adx.diMinus>adx.diPlus) s-=2;
  if (change>2) s+=1; else if (change<-3) s-=1;
  if (volRatio>1.5) s+=1; else if (volRatio<0.5) s-=1;
  return Math.max(-13, Math.min(13, s));
}

function getSignalType(score, mkt) {
  if (mkt==='BEAR') return 'BLOCKED';
  if (mkt==='NEUTRAL') {
    if (score>=T.STRONG_BUY) return 'STRONG_BUY';
    if (score>=T.WATCH) return 'WATCH';
    return 'BLOCKED';
  }
  if (score>=T.STRONG_BUY) return 'STRONG_BUY';
  if (score>=T.BUY) return 'BUY';
  if (score>=T.WATCH) return 'WATCH';
  return 'BLOCKED';
}

// ═══════════════════════════
// POSITION SIZING
// ═══════════════════════════
function calcPos(bal, entry, sl, score, atr, price, h4ok) {
  if (bal<=0||!entry||!sl) return {enterUSDT:MIN_TRADE, positionSize:MIN_TRADE/entry};
  const baseRisk = bal*0.02;
  const sMul = score>=8?1.3:score>=5?1.0:0.6;
  const atrR = atr/price;
  const vMul = atrR<0.01?1.2:atrR<0.02?1.0:atrR<0.04?0.7:0.4;
  const tMul = h4ok?1.2:0.8;
  const risk = baseRisk*sMul*vMul*tMul;
  const rpc = Math.abs(entry-sl);
  if (rpc===0) return {enterUSDT:MIN_TRADE, positionSize:MIN_TRADE/entry};
  let pos = risk/rpc;
  let usdt = pos*entry;
  const maxUsdt = bal*0.12;
  if (usdt>maxUsdt) { usdt=maxUsdt; pos=usdt/entry; }
  if (usdt<MIN_TRADE) { usdt=MIN_TRADE; pos=usdt/entry; }
  return {enterUSDT:Math.round(usdt*100)/100, positionSize:pos};
}

// ═══════════════════════════
// API CALLS
// ═══════════════════════════
async function getBTCStatus() {
  const r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=210');
  const d = await r.json();
  const closes=d.map(k=>parseFloat(k[4])), highs=d.map(k=>parseFloat(k[2])), lows=d.map(k=>parseFloat(k[3]));
  const price=closes[closes.length-1], ema200=calcEMA(closes,200), rsi=calcRSI(closes), adx=calcADX(highs,lows,closes);
  let c=0;
  if (ema200&&price>ema200) c++;
  if (adx.adx>20) c++;
  if (rsi>45) c++;
  return c===3?'BULL':c>=1?'NEUTRAL':'BEAR';
}
async function check4H(sym) {
  try {
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=4h&limit=60`);
    const d=await r.json();
    const closes=d.map(k=>parseFloat(k[4])), price=closes[closes.length-1], ema50=calcEMA(closes,50);
    return ema50?price>ema50:false;
  } catch(e) { return false; }
}
async function fetchKlines(sym) {
  const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=1h&limit=60`);
  const d=await r.json();
  return {closes:d.map(k=>parseFloat(k[4])),highs:d.map(k=>parseFloat(k[2])),lows:d.map(k=>parseFloat(k[3])),volumes:d.map(k=>parseFloat(k[5]))};
}
async function fetch24h() {
  const syms=SYMBOLS.map(s=>`"${s}"`).join(',');
  const r=await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=[${syms}]`);
  const d=await r.json();
  const m={}; d.forEach(t=>{m[t.symbol]=t;}); return m;
}

// ═══════════════════════════
// MAIN FETCH
// ═══════════════════════════
function setStatus(type) {
  const dot=document.getElementById('liveDot'), txt=document.getElementById('liveText');
  dot.className='live-dot';
  if (type==='live') { txt.textContent='LIVE'; }
  else if (type==='updating') { dot.classList.add('updating'); txt.textContent='UPDATING'; }
  else { dot.classList.add('error'); txt.textContent='ERROR'; }
}

async function fetchAllSignals() {
  setStatus('updating');
  hasError = false;
  try {
    setStep('Checking BTC market...');
    marketStatus = await getBTCStatus();
    updateBanner();

    setStep('Loading price data...');
    const [t24,...klines] = await Promise.all([fetch24h(),...SYMBOLS.map(s=>fetchKlines(s).catch(()=>null))]);

    setStep('Scoring signals...');
    const raw=[];
    for (let i=0;i<SYMBOLS.length;i++) {
      const sym=SYMBOLS[i], k=klines[i];
      if (!k) continue;
      const {closes,highs,lows,volumes}=k;
      const price=closes[closes.length-1];
      const t=t24[sym]||{}, change=parseFloat(t.priceChangePercent)||0;
      const volRatio=calcVolRatio(volumes);
      if (volRatio<0.15) continue;
      const ind={rsi:calcRSI(closes),macd:calcMACD(closes),ema9:calcEMA(closes,9),ema21:calcEMA(closes,21),ema50:calcEMA(closes,50),bb:calcBB(closes),atr:calcATR(highs,lows,closes),adx:calcADX(highs,lows,closes),change,volRatio};
      const score=scoreSignal(ind,price);
      const signal=getSignalType(score,marketStatus);
      if (signal==='BLOCKED') continue;
      const atr=ind.atr||price*0.015;
      const sl=price-atr*1.5, tp=price+atr*(signal==='STRONG_BUY'?3.5:signal==='BUY'?3.0:2.0), buyAt=price-atr*0.3;
      raw.push({sym,price,change,score,signal,sl,tp,buyAt,atr,ind});
    }

    setStep('Checking 4H trend...');
    const h4=await Promise.all(raw.map(s=>check4H(s.sym)));

    signals=[];
    for (let i=0;i<raw.length;i++) {
      const s=raw[i], h4ok=h4[i];
      const pos=balance>0?calcPos(balance,s.buyAt,s.sl,s.score,s.atr,s.price,h4ok):{enterUSDT:0,positionSize:0};
      const profit=pos.positionSize>0?(s.tp-s.buyAt)*pos.positionSize:0;
      signals.push({...s,h4ok,enterUSDT:pos.enterUSDT,positionSize:pos.positionSize,profit});
    }
    signals.sort((a,b)=>b.score-a.score);

    renderSignals();
    document.getElementById('filterRow').style.display='flex';
    document.getElementById('refreshBar').textContent=`Updated ${new Date().toLocaleTimeString()} · ${signals.length} signals found`;
    setStatus('live');
    lastRefresh=Date.now();
  } catch(e) {
    hasError=true;
    setStatus('error');
    showError(e.message||'Network error');
    console.error(e);
  }
}

function setStep(txt) { const el=document.getElementById('loadStep'); if(el) el.textContent=txt; }

function showError(msg) {
  document.getElementById('signalsList').innerHTML=`
  <div class="error-state">
    <div class="error-title">⚠️ Connection Error</div>
    <div class="error-sub">Could not reach Binance API.<br>Check your internet and try again.<br><small style="color:var(--text3)">${msg}</small></div>
    <button class="retry-btn" onclick="retryFetch()">🔄 Retry Now</button>
  </div>`;
}

function retryFetch() {
  document.getElementById('signalsList').innerHTML=`
  <div class="loading-state">
    <div class="loader-ring"></div>
    <div class="loading-title">Retrying...</div>
    <div class="loading-sub" id="loadStep">Connecting...</div>
  </div>`;
  fetchAllSignals();
}

function updateBanner() {
  const el=document.getElementById('mktBanner');
  el.style.display='flex';
  if (marketStatus==='BULL') { el.className='market-banner mb-bull'; el.innerHTML='<span>🟢</span> Bull Market — All signals active'; }
  else if (marketStatus==='NEUTRAL') { el.className='market-banner mb-neutral'; el.innerHTML='<span>🟡</span> Neutral Market — Selective signals'; }
  else { el.className='market-banner mb-bear'; el.innerHTML='<span>🔴</span> Bear Market — Proceed with caution'; }
}

// ═══════════════════════════
// RENDER
// ═══════════════════════════
function fmtP(p) {
  if (!p) return '—';
  if (p>=1000) return '$'+p.toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:1});
  if (p>=1) return '$'+p.toFixed(4);
  return '$'+p.toFixed(8);
}

function renderSignals() {
  const list=document.getElementById('signalsList');
  const filtered=currentFilter==='ALL'?signals:signals.filter(s=>s.signal===currentFilter);
  if (filtered.length===0) {
    list.innerHTML='<div class="empty-state">No '+currentFilter.replace('_',' ')+' signals right now.<br>Refreshing every 30s.</div>';
    return;
  }
  const strong=filtered.filter(s=>s.signal==='STRONG_BUY');
  const buys=filtered.filter(s=>s.signal==='BUY');
  const watches=filtered.filter(s=>s.signal==='WATCH');
  let html='';
  if (currentFilter==='ALL') {
    if (strong.length) html+=section('🔥 STRONG BUY',strong);
    if (buys.length) html+=section('✅ BUY SIGNALS',buys);
    if (watches.length) {
      html+=`<div class="watch-note">👀 Watch signals are building momentum — use smaller size</div>`;
      html+=section('👀 WATCH LIST',watches,true);
    }
  } else {
    html=filtered.map(s=>card(s)).join('');
  }
  list.innerHTML=html;
}

function section(title, items, isWatch=false) {
  return `<div class="section-hd"><div class="section-hd-line"></div><div class="section-hd-txt">${title}</div><div class="section-hd-line"></div></div>${items.map(s=>card(s,isWatch)).join('')}`;
}

function card(s, isWatch=false) {
  const isStrong=s.signal==='STRONG_BUY', isBuy=s.signal==='BUY';
  const stripClass=isStrong?'strip-strong':isBuy?'strip-buy':'strip-watch';
  const cardClass=isStrong?'card-strong':s.signal==='WATCH'?'card-watch':'';
  const badgeTxt=isStrong?'🔥 STRONG BUY':isBuy?'✅ BUY':'👀 WATCH';
  const btnClass=isStrong?'btn-strong':isBuy?'btn-buy':'btn-watch';
  const btnTxt=isStrong?'TRADE':'TRADE';

  const scorePct=Math.max(0,Math.min(100,((s.score+13)/26)*100));
  const barColor=isStrong?'#22C76E':isBuy?'#3B82F6':'#8B5CF6';

  const chgStr=(s.change>=0?'+':'')+s.change.toFixed(2)+'%';
  const chgClass=s.change>0?'chg-pos':s.change<0?'chg-neg':'chg-zero';

  const enterStr=s.enterUSDT>0?'$'+s.enterUSDT.toFixed(2)+' USDT':(balance<=0?'Set balance →':'$'+MIN_TRADE+' USDT');
  const profitStr=s.profit>0?'+$'+s.profit.toFixed(2):(balance<=0?'Set balance →':'—');

  const idx=signals.indexOf(s);

  return `
  <div class="sig-card ${cardClass}">
    <div class="card-strip ${stripClass}"></div>
    <div class="card-head">
      <div>
        <div class="coin-name">${s.sym.replace('USDT','')}<span>/USDT</span></div>
        <div class="coin-change ${chgClass}">${chgStr} 24h</div>
      </div>
      <div class="sig-badge badge-${s.signal}">${badgeTxt}</div>
    </div>
    <div class="confirm-row">
      <div class="confirm-tag ${s.h4ok?'tag-yes':'tag-no'}">${s.h4ok?'✅ 4H CONFIRMED':'⚠️ NO 4H CONFIRM'}</div>
      <div class="score-chip">Score ${s.score}/13</div>
    </div>
    <div class="score-bar-row">
      <div class="score-track"><div class="score-fill" style="width:${scorePct}%;background:${barColor}"></div></div>
    </div>
    <div class="card-div"></div>
    <div class="price-grid">
      <div class="price-cell"><div class="price-lbl">Buy At</div><div class="price-val pv-buy">${fmtP(s.buyAt)}</div></div>
      <div class="price-cell"><div class="price-lbl">Target</div><div class="price-val pv-sell">${fmtP(s.tp)}</div></div>
      <div class="price-cell"><div class="price-lbl">Stop Loss</div><div class="price-val pv-sl">${fmtP(s.sl)}</div></div>
    </div>
    <div class="card-div"></div>
    <div class="card-foot">
      <div class="foot-left">
        <div class="foot-row">
          <span class="foot-lbl">ENTER</span>
          <span class="foot-val">${enterStr}</span>
        </div>
        <div class="foot-row">
          <span class="foot-lbl">PROFIT</span>
          <span class="foot-val foot-profit">${profitStr}</span>
        </div>
      </div>
      <button class="trade-btn ${btnClass}" onclick="openTrade(${idx})">
        <span class="btn-main">${btnTxt}</span>
        <span class="btn-sub">${isStrong?'HIGH CONF':isBuy?'STANDARD':'WATCH'}</span>
      </button>
    </div>
  </div>`;
}

// ═══════════════════════════
// TRADE
// ═══════════════════════════
function openTrade(i) {
  const s=signals[i];
  if (!s) return;
  if (balance<=0) { openBalanceSheet(); return; } // ✅ open balance sheet instead of alert
  const trade={
    id:Date.now(), sym:s.sym, signal:s.signal, score:s.score,
    entryPrice:s.buyAt, takeProfit:s.tp, stopLoss:s.sl,
    enterUSDT:s.enterUSDT||MIN_TRADE, positionSize:s.positionSize||(MIN_TRADE/s.buyAt),
    profit:s.profit, h4ok:s.h4ok, status:'OPEN',
    closePrice:null, actualPnL:null,
    timestamp:new Date().toISOString()
  };
  updateBalanceLive(-trade.enterUSDT);
  trades.unshift(trade);
  saveState();
  renderTracker();
  renderStats();
  switchTab('tracker');
}

function renderTracker() {
  const list=document.getElementById('trackerList');
  if (!trades.length) { list.innerHTML='<div class="empty-state">No trades yet.<br>Tap <strong>TRADE</strong> on any signal.</div>'; return; }
  list.innerHTML=trades.map(t=>{
    const pnlClass=t.actualPnL===null?'pnl-z':t.actualPnL>=0?'pnl-p':'pnl-n';
    const pnlStr=t.actualPnL!==null?(t.actualPnL>=0?'+':'')+' $'+Math.abs(t.actualPnL).toFixed(2):'Open';
    const dt=new Date(t.timestamp).toLocaleDateString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    return `
    <div class="trade-card">
      <div class="tc-head">
        <div>
          <div class="tc-coin">${t.sym.replace('USDT','')}/USDT <span style="font-size:10px;color:var(--text3);font-weight:500">${t.h4ok?'✅ 4H':'⚠️'}</span></div>
          <div class="tc-meta">${dt} · Score ${t.score}/13</div>
        </div>
        <div class="tc-status st-${t.status}">${t.status}</div>
      </div>
      <div class="tc-grid">
        <div class="tc-cell"><div class="tc-cell-lbl">Entry</div><div class="tc-cell-val">${fmtP(t.entryPrice)}</div></div>
        <div class="tc-cell"><div class="tc-cell-lbl">Target</div><div class="tc-cell-val" style="color:var(--green)">${fmtP(t.takeProfit)}</div></div>
        <div class="tc-cell"><div class="tc-cell-lbl">Stop</div><div class="tc-cell-val" style="color:var(--red)">${fmtP(t.stopLoss)}</div></div>
      </div>
      <div class="tc-foot">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:3px">Entered $${t.enterUSDT?.toFixed(2)} · Est +$${t.profit?.toFixed(2)||'—'}</div>
          <div class="tc-pnl ${pnlClass}">${pnlStr}</div>
        </div>
        <div class="tc-acts">
          ${t.status==='OPEN'?`<button class="btn-close" onclick="openCloseModal(${t.id})">Close</button>`:''}
          <button class="btn-del" onclick="deleteTrade(${t.id})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openCloseModal(id) {
  activeTradeId=id;
  const t=trades.find(x=>x.id===id); if(!t) return;
  document.getElementById('mCoin').textContent=t.sym.replace('USDT','/USDT');
  document.getElementById('mSub').textContent=`Entry ${fmtP(t.entryPrice)} · Target ${fmtP(t.takeProfit)}`;
  document.getElementById('mPriceInput').value='';
  document.getElementById('mPnlVal').textContent='—';
  document.getElementById('mPnlVal').style.color='var(--text3)';
  document.getElementById('closeModal').classList.add('open');
}
function calcModalPnl() {
  const t=trades.find(x=>x.id===activeTradeId); if(!t) return;
  const cp=parseFloat(document.getElementById('mPriceInput').value); if(isNaN(cp)) return;
  const pnl=(cp-t.entryPrice)*t.positionSize;
  const el=document.getElementById('mPnlVal');
  el.textContent=(pnl>=0?'+':'')+' $'+Math.abs(pnl).toFixed(2);
  el.style.color=pnl>=0?'var(--green)':'var(--red)';
}
function confirmClose(outcome) {
  const t=trades.find(x=>x.id===activeTradeId); if(!t) return;
  const cp=parseFloat(document.getElementById('mPriceInput').value);
  t.closePrice=isNaN(cp)?(outcome==='WIN'?t.takeProfit:t.stopLoss):cp;
  t.actualPnL=(t.closePrice-t.entryPrice)*t.positionSize;
  t.outcome=outcome; t.status=outcome;
  updateBalanceLive(t.actualPnL+t.enterUSDT);
  saveState(); closeModal(); renderTracker(); renderStats();
}
function closeModal() { document.getElementById('closeModal').classList.remove('open'); activeTradeId=null; }
function deleteTrade(id) { trades=trades.filter(t=>t.id!==id); saveState(); renderTracker(); renderStats(); }

// ═══════════════════════════
// STATS
// ═══════════════════════════
function renderStats() {
  const c=document.getElementById('statsWrap');
  const closed=trades.filter(t=>t.status!=='OPEN'), open=trades.filter(t=>t.status==='OPEN');
  const wins=trades.filter(t=>t.status==='WIN'), losses=trades.filter(t=>t.status==='LOSS');
  const totalPnL=closed.reduce((a,t)=>a+(t.actualPnL||0),0);
  const wr=closed.length?(wins.length/closed.length*100):0;
  const avg=closed.length?totalPnL/closed.length:0;
  const best=wins.length?Math.max(...wins.map(t=>t.actualPnL||0)):null;
  const worst=losses.length?Math.min(...losses.map(t=>t.actualPnL||0)):null;
  const pnlColor=totalPnL>=0?'#22C76E':'#EF4444';

  c.innerHTML=`
  <div class="hero-card">
    <div class="hero-lbl">Total Performance</div>
    <div class="hero-pnl" style="color:${pnlColor}">${totalPnL>=0?'+':''}$${Math.abs(totalPnL).toFixed(2)}</div>
    <div class="wr-row"><span class="wr-lbl">Win Rate</span><span class="wr-val">${wr.toFixed(0)}%</span></div>
    <div class="wr-track"><div class="wr-fill" style="width:${Math.min(wr,100)}%"></div></div>
    <div class="hero-grid">
      <div class="hero-box"><div class="hero-box-val" style="color:#22C76E">${wins.length}</div><div class="hero-box-lbl">WINS ✅</div></div>
      <div class="hero-box"><div class="hero-box-val" style="color:#EF4444">${losses.length}</div><div class="hero-box-lbl">LOSSES ❌</div></div>
      <div class="hero-box"><div class="hero-box-val" style="color:#F59E0B">${open.length}</div><div class="hero-box-lbl">OPEN 🟡</div></div>
    </div>
  </div>
  <div class="info-card">
    <div class="info-card-title">Trade Breakdown</div>
    <div class="info-row"><span class="info-row-lbl">Total Trades</span><span class="info-row-val">${trades.length}</span></div>
    <div class="info-row"><span class="info-row-lbl">Avg Profit</span><span class="info-row-val" style="color:${avg>=0?'var(--green)':'var(--red)'}">${avg>=0?'+':''}$${Math.abs(avg).toFixed(2)}</span></div>
    <div class="info-row"><span class="info-row-lbl">Best Trade 🏆</span><span class="info-row-val" style="color:var(--green)">${best!==null?'+$'+best.toFixed(2):'—'}</span></div>
    <div class="info-row"><span class="info-row-lbl">Worst Trade</span><span class="info-row-val" style="color:var(--red)">${worst!==null?'−$'+Math.abs(worst).toFixed(2):'—'}</span></div>
    <div class="info-row"><span class="info-row-lbl">Current Balance</span><span class="info-row-val" style="color:var(--green)">$${balance.toFixed(2)}</span></div>
  </div>
  <div class="rules-card">
    <div class="rules-title">⚡ Golden Rules</div>
    ${['Prioritize 🔥 STRONG BUY + 4H Confirmed','Watch signals = smaller size only','Always honor your Stop Loss','Never average down on a loss','Take profit at target — no greed','Track every trade for improvement'].map((r,i)=>`<div class="rule"><span class="rule-n">${i+1}</span><span>${r}</span></div>`).join('')}
  </div>
  ${trades.length?'<button class="clear-btn" onclick="clearHistory()">🗑 Clear All Trade History</button>':''}`;
}

function clearHistory() {
  if (confirm('Clear all trade history?')) { trades=[]; saveState(); renderTracker(); renderStats(); }
}

// ═══════════════════════════
// NAV
// ═══════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  currentTab=tab;
  if (tab==='tracker') renderTracker();
  if (tab==='stats') renderStats();
}
function setFilter(el) {
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentFilter=el.dataset.f;
  renderSignals();
}

// ═══════════════════════════
// REFRESH
// ═══════════════════════════
function startRefresh() {
  clearInterval(refreshTimer);
  refreshTimer=setInterval(()=>{ if(document.visibilityState==='visible') fetchAllSignals(); }, 30000);
}
document.addEventListener('visibilitychange',()=>{
  if (document.visibilityState==='visible') {
    if (Date.now()-lastRefresh>30000) fetchAllSignals();
    startRefresh();
  }
});

// ═══════════════════════════
// INIT
// ═══════════════════════════
loadState();
renderTracker();
renderStats();
fetchAllSignals().then(()=>startRefresh());
</script>

</body>
</html>
