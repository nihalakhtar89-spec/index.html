<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D0F1A">
<title>⚡ Signal Engine v10</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0D0F1A;
  --bg2:#141620;
  --bg3:#1A1D2E;
  --card:#1E2132;
  --card2:#252840;
  --border:#2A2D42;
  --border2:#333652;
  --text:#F0F2FF;
  --text2:#A0A5C0;
  --text3:#5A6080;
  --green:#00C076;
  --green-bg:rgba(0,192,118,0.12);
  --green-bd:rgba(0,192,118,0.3);
  --red:#FF4757;
  --red-bg:rgba(255,71,87,0.12);
  --red-bd:rgba(255,71,87,0.3);
  --blue:#3D8EFF;
  --blue-bg:rgba(61,142,255,0.12);
  --blue-bd:rgba(61,142,255,0.3);
  --amber:#FFB800;
  --amber-bg:rgba(255,184,0,0.12);
  --amber-bd:rgba(255,184,0,0.3);
  --purple:#A855F7;
  --purple-bg:rgba(168,85,247,0.12);
  --purple-bd:rgba(168,85,247,0.3);
  --gold:#FFB800;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:14px;
  --r-sm:9px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:0;-webkit-font-smoothing:antialiased}

/* ── TOP BAR ── */
.topbar{
background:var(–bg2);
border-bottom:1px solid var(–border);
padding:12px 14px 10px;
position:sticky;top:0;z-index:200;
}
.top-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand{display:flex;align-items:center;gap:8px}
.brand-icon{color:var(–amber);font-size:18px}
.brand-name{font-size:15px;font-weight:800;color:var(–text);letter-spacing:-0.3px;text-transform:uppercase}
.brand-ver{font-family:var(–mono);font-size:9px;background:var(–blue-bg);color:var(–blue);padding:2px 6px;border-radius:20px;border:1px solid var(–blue-bd)}

.top-right{display:flex;align-items:center;gap:8px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(–green);box-shadow:0 0 8px var(–green);animation:pulse 2s infinite}
.live-dot.err{background:var(–red);box-shadow:0 0 8px var(–red)}
.live-dot.upd{background:var(–amber);box-shadow:0 0 8px var(–amber)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.fg-pill{display:flex;align-items:center;gap:5px;background:var(–bg3);border:1px solid var(–border);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
.fg-icon{font-size:13px}

.update-row{font-family:var(–mono);font-size:10px;color:var(–text3);margin-bottom:8px}
.update-row span{color:var(–text2)}

/* Balance + Risk row */
.controls-row{display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
.bal-wrap{display:flex;align-items:center;gap:6px;background:var(–bg3);border:1px solid var(–border);border-radius:var(–r-sm);padding:7px 10px;flex:1;min-width:0;cursor:pointer}
.bal-icon{font-size:14px;flex-shrink:0}
.bal-label{font-size:10px;color:var(–text3);font-weight:600;white-space:nowrap}
.bal-value{font-family:var(–mono);font-size:15px;font-weight:700;color:var(–amber);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.risk-group{display:flex;gap:4px;flex-shrink:0}
.risk-btn{background:var(–bg3);border:1px solid var(–border);color:var(–text2);font-family:var(–mono);font-size:11px;font-weight:700;padding:7px 9px;border-radius:var(–r-sm);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.risk-btn.active{background:var(–amber);color:#000;border-color:var(–amber)}

/* signal count strip */
.count-strip{display:flex;gap:6px;padding:10px 14px;background:var(–bg2);border-bottom:1px solid var(–border);overflow-x:auto;scrollbar-width:none}
.count-strip::-webkit-scrollbar{display:none}
.count-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(–border);background:var(–bg3);color:var(–text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.count-chip .dot{width:8px;height:8px;border-radius:50%}
.count-chip.active{border-color:currentColor}
.chip-all.active{color:var(–text);background:var(–card2);border-color:var(–border2)}
.chip-sb.active{color:var(–green);background:var(–green-bg);border-color:var(–green-bd)}
.chip-buy.active{color:var(–blue);background:var(–blue-bg);border-color:var(–blue-bd)}
.chip-neu.active{color:var(–text2);background:var(–bg3);border-color:var(–border2)}
.chip-sell.active{color:var(–red);background:var(–red-bg);border-color:var(–red-bd)}
.chip-watch.active{color:var(–purple);background:var(–purple-bg);border-color:var(–purple-bd)}

.pull-hint{text-align:center;padding:6px;font-size:11px;color:var(–text3);font-family:var(–mono)}

/* ── SIGNAL CARDS ── */
.signals-wrap{padding:10px 12px}

.sig-card{
background:var(–card);
border-radius:var(–r);
border:1px solid var(–border);
margin-bottom:10px;
overflow:hidden;
transition:border-color 0.2s;
}
.sig-card.sb{border-left:3px solid var(–green)}
.sig-card.buy{border-left:3px solid var(–blue)}
.sig-card.neu{border-left:3px solid var(–text3)}
.sig-card.sell{border-left:3px solid var(–red)}
.sig-card.watch{border-left:3px solid var(–purple)}

/* Card header */
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px 8px}
.coin-block{}
.coin-sym{font-size:17px;font-weight:800;color:var(–text);letter-spacing:-0.4px}
.coin-sym span{font-size:12px;font-weight:500;color:var(–text3);letter-spacing:0}
.coin-price{font-family:var(–mono);font-size:13px;font-weight:600;color:var(–text);margin-top:1px}
.coin-chg{font-family:var(–mono);font-size:11px;font-weight:600;margin-top:1px}
.chg-p{color:var(–green)}.chg-n{color:var(–red)}.chg-z{color:var(–text3)}

.card-right{text-align:right}
.sig-badge{display:inline-block;padding:5px 11px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:0.3px;margin-bottom:5px}
.b-sb{background:var(–green);color:#000}
.b-buy{background:var(–blue);color:#fff}
.b-neu{background:var(–card2);color:var(–text2);border:1px solid var(–border2)}
.b-sell{background:var(–red);color:#fff}
.b-watch{background:var(–purple);color:#fff}
.score-badge{font-family:var(–mono);font-size:11px;font-weight:700;color:var(–text2);background:var(–bg3);border:1px solid var(–border);border-radius:20px;padding:3px 8px;display:inline-block}

/* Indicator tags */
.ind-row{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 10px}
.ind-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:var(–bg3);border:1px solid var(–border);color:var(–text3);font-family:var(–mono);white-space:nowrap}
.ind-tag .ind-key{color:var(–text3)}
.ind-tag .ind-val{margin-left:2px}
.ind-tag.bull .ind-val{color:var(–green)}
.ind-tag.bear .ind-val{color:var(–red)}
.ind-tag.neutral .ind-val{color:var(–amber)}
.ind-tag.purple .ind-val{color:var(–purple)}

/* Divider */
.cd{height:1px;background:var(–border);margin:0 14px}

/* Price row */
.price-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:10px 14px;gap:0}
.pr-cell{text-align:center}
.pr-lbl{font-size:9px;font-weight:700;color:var(–text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:3px}
.pr-val{font-family:var(–mono);font-size:11px;font-weight:600}
.pr-sl{color:var(–red)}.pr-tp{color:var(–green)}.pr-rr{color:var(–amber)}.pr-now{color:var(–text)}

/* Position calc */
.pos-calc{background:var(–bg3);border-top:1px solid var(–border);padding:12px 14px}
.pos-calc-title{font-size:10px;font-weight:800;color:var(–amber);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pos-box{background:var(–card2);border:1px solid var(–border2);border-radius:var(–r-sm);padding:9px 10px}
.pos-box-lbl{font-size:9px;font-weight:700;color:var(–text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px}
.pos-box-val{font-family:var(–mono);font-size:14px;font-weight:700;color:var(–text)}
.pos-box-val.green{color:var(–green)}.pos-box-val.red{color:var(–red)}.pos-box-val.blue{color:var(–blue)}

.risk-bar-wrap{margin-bottom:12px}
.risk-bar-track{height:4px;background:var(–border);border-radius:2px;overflow:hidden}
.risk-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(–red),var(–amber));transition:width 0.5s ease}

/* Card actions */
.card-acts{display:flex;gap:8px;padding:0 14px 12px}
.btn-track{flex:1;background:var(–green);color:#000;border:none;border-radius:var(–r-sm);font-family:var(–font);font-size:13px;font-weight:800;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s}
.btn-track:active{transform:scale(0.97);background:#00A865}
.btn-binance{background:var(–bg3);border:1px solid var(–border);color:var(–text2);font-family:var(–font);font-size:12px;font-weight:700;padding:12px 16px;border-radius:var(–r-sm);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;text-decoration:none;transition:all 0.15s}
.btn-binance:active{background:var(–card2)}

/* Expand toggle */
.expand-row{text-align:center;padding:6px;cursor:pointer;color:var(–text3);font-size:11px;font-weight:600;border-top:1px solid var(–border);display:flex;align-items:center;justify-content:center;gap:4px}

/* Loading */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.loader{width:40px;height:40px;border:3px solid var(–border);border-top-color:var(–green);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-size:15px;font-weight:700;color:var(–text)}
.load-sub{font-size:12px;color:var(–text3);font-family:var(–mono)}

.error-box{margin:14px;background:var(–red-bg);border:1px solid var(–red-bd);border-radius:var(–r);padding:20px;text-align:center}
.err-title{font-size:15px;font-weight:800;color:var(–red);margin-bottom:6px}
.err-sub{font-size:12px;color:var(–text2);margin-bottom:16px;line-height:1.5}
.retry-btn{background:var(–red);color:#fff;border:none;border-radius:var(–r-sm);font-family:var(–font);font-size:13px;font-weight:800;padding:11px 28px;cursor:pointer}

.empty-state{text-align:center;padding:50px 20px;color:var(–text3);font-size:14px;font-weight:600}

/* Market banner */
.mkt-banner{padding:8px 14px;font-size:11px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;border-bottom:1px solid var(–border)}
.mb-bull{background:var(–green-bg);color:var(–green)}
.mb-neutral{background:var(–amber-bg);color:var(–amber)}
.mb-bear{background:var(–red-bg);color:var(–red)}

/* TRACKER */
.tracker-wrap{padding:10px 12px}
.tr-card{background:var(–card);border-radius:var(–r);border:1px solid var(–border);margin-bottom:10px;overflow:hidden}
.tr-hd{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 14px 8px}
.tr-coin{font-size:16px;font-weight:800;color:var(–text);letter-spacing:-0.3px}
.tr-meta{font-size:10px;color:var(–text3);margin-top:3px;font-family:var(–mono)}
.tr-status{font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;letter-spacing:0.5px}
.st-OPEN{background:var(–amber-bg);color:var(–amber);border:1px solid var(–amber-bd)}
.st-WIN{background:var(–green-bg);color:var(–green);border:1px solid var(–green-bd)}
.st-LOSS{background:var(–red-bg);color:var(–red);border:1px solid var(–red-bd)}
.tr-grid{display:grid;grid-template-columns:repeat(3,1fr);padding:6px 14px 10px}
.tr-cell{text-align:center}
.tr-lbl{font-size:9px;color:var(–text3);font-weight:700;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:3px}
.tr-val{font-family:var(–mono);font-size:12px;font-weight:600;color:var(–text)}
.tr-foot{background:var(–bg3);border-top:1px solid var(–border);padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.tr-pnl{font-family:var(–mono);font-size:20px;font-weight:700}
.pnl-p{color:var(–green)}.pnl-n{color:var(–red)}.pnl-z{color:var(–text3)}
.tr-acts{display:flex;gap:6px}
.btn-cl{background:var(–bg3);border:1px solid var(–border);color:var(–text);font-family:var(–font);font-size:12px;font-weight:700;padding:8px 14px;border-radius:var(–r-sm);cursor:pointer}
.btn-dl{background:var(–red-bg);border:1px solid var(–red-bd);color:var(–red);font-size:13px;padding:8px 12px;border-radius:var(–r-sm);cursor:pointer}

/* STATS */
.stats-wrap{padding:10px 12px}
.hero-stat{background:var(–card);border-radius:var(–r);border:1px solid var(–border);padding:18px;margin-bottom:10px;position:relative;overflow:hidden}
.hero-stat::after{content:’’;position:absolute;top:-30px;right:-20px;width:120px;height:120px;background:radial-gradient(circle,rgba(0,192,118,0.08) 0%,transparent 70%)}
.hs-lbl{font-size:10px;font-weight:700;color:var(–text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.hs-pnl{font-family:var(–mono);font-size:32px;font-weight:800;line-height:1;margin-bottom:14px;letter-spacing:-1px}
.wr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.wr-lbl{font-size:12px;color:var(–text2);font-weight:500}
.wr-val{font-family:var(–mono);font-size:13px;font-weight:700;color:var(–text)}
.wr-track{height:5px;background:var(–border);border-radius:3px;overflow:hidden;margin-bottom:14px}
.wr-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(–green),#80FFB8);transition:width 0.8s ease}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-box{background:var(–bg3);border:1px solid var(–border);border-radius:var(–r-sm);padding:10px 8px;text-align:center}
.stat-box-val{font-family:var(–mono);font-size:18px;font-weight:800;color:var(–text)}
.stat-box-lbl{font-size:9px;color:var(–text3);font-weight:600;margin-top:2px;letter-spacing:0.4px}
.info-card{background:var(–card);border-radius:var(–r);border:1px solid var(–border);padding:14px;margin-bottom:10px}
.ic-title{font-size:10px;font-weight:800;color:var(–text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.ic-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(–border)}
.ic-row:last-child{border-bottom:none}
.ic-lbl{font-size:13px;color:var(–text2);font-weight:500}
.ic-val{font-family:var(–mono);font-size:13px;font-weight:700;color:var(–text)}
.rules-card{background:var(–blue-bg);border:1px solid var(–blue-bd);border-radius:var(–r);padding:14px;margin-bottom:10px}
.rc-title{font-size:10px;font-weight:800;color:var(–blue);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.rule-item{display:flex;gap:8px;padding:5px 0;font-size:12px;color:var(–text2);line-height:1.5;align-items:flex-start}
.rule-n{font-family:var(–mono);font-size:10px;color:var(–blue);font-weight:700;min-width:16px;margin-top:2px}
.clear-btn{width:100%;background:var(–red-bg);border:1px solid var(–red-bd);color:var(–red);font-family:var(–font);font-size:13px;font-weight:800;padding:13px;border-radius:var(–r-sm);cursor:pointer}

/* TABS */
.tabs-bar{position:fixed;bottom:0;left:0;right:0;background:var(–bg2);border-top:1px solid var(–border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(–text3);cursor:pointer;border:none;background:none;transition:color 0.15s;letter-spacing:0.3px;position:relative}
.tab-btn.active{color:var(–amber)}
.tab-btn.active::after{content:’’;position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:28px;height:2px;background:var(–amber);border-radius:1px 1px 0 0}
.tab-icon{font-size:20px;line-height:1}

/* PAGE */
.page{display:none;padding-bottom:80px}
.page.active{display:block}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:400;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-ov.open{display:flex}
.modal-sheet{background:var(–bg2);border-radius:20px 20px 0 0;padding:20px 18px 36px;width:100%;animation:slideUp 0.28s cubic-bezier(0.32,0.72,0,1);border-top:1px solid var(–border)}
@keyframes slideUp{from{transform:translateY(100%)}}
.m-handle{width:36px;height:4px;background:var(–border2);border-radius:2px;margin:0 auto 18px}
.m-title{font-size:18px;font-weight:800;color:var(–text);margin-bottom:4px;letter-spacing:-0.4px}
.m-sub{font-size:12px;color:var(–text3);margin-bottom:18px;font-family:var(–mono)}
.m-lbl{font-size:11px;font-weight:700;color:var(–text2);margin-bottom:7px;letter-spacing:0.4px}
.m-input{width:100%;background:var(–bg3);border:1.5px solid var(–border2);border-radius:var(–r-sm);font-family:var(–mono);font-size:20px;font-weight:600;color:var(–text);padding:13px 14px;outline:none;margin-bottom:12px}
.m-input:focus{border-color:var(–amber)}
.pnl-prev{background:var(–bg3);border:1.5px solid var(–border2);border-radius:var(–r-sm);padding:13px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.pnl-prev-lbl{font-size:12px;color:var(–text3);font-weight:500}
.pnl-prev-val{font-family:var(–mono);font-size:22px;font-weight:800}
.m-btns{display:flex;gap:8px}
.m-btn{flex:1;padding:14px;border-radius:var(–r-sm);font-family:var(–font);font-size:14px;font-weight:800;cursor:pointer;border:none}
.m-win{background:var(–green);color:#000}
.m-loss{background:var(–red);color:#fff}
.m-cancel{background:var(–bg3);color:var(–text2);border:1px solid var(–border)}

/* Balance sheet */
.bal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:400;align-items:flex-end;backdrop-filter:blur(4px)}
.bal-ov.open{display:flex}
.bal-sheet{background:var(–bg2);border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;animation:slideUp 0.28s cubic-bezier(0.32,0.72,0,1);border-top:1px solid var(–border)}
.bs-title{font-size:20px;font-weight:800;color:var(–text);margin-bottom:4px}
.bs-sub{font-size:13px;color:var(–text3);margin-bottom:18px}
.bs-input-wrap{position:relative;margin-bottom:14px}
.bs-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:var(–mono);font-size:22px;font-weight:700;color:var(–text3)}
.bs-input{width:100%;background:var(–bg3);border:2px solid var(–border2);border-radius:var(–r-sm);font-family:var(–mono);font-size:26px;font-weight:700;color:var(–text);padding:14px 14px 14px 38px;outline:none}
.bs-input:focus{border-color:var(–amber)}
.quick-row{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.quick-btn{flex:1;min-width:56px;background:var(–bg3);border:1px solid var(–border);border-radius:var(–r-sm);font-family:var(–mono);font-size:12px;font-weight:700;color:var(–text2);padding:9px 4px;text-align:center;cursor:pointer;transition:all 0.15s}
.quick-btn.sel,.quick-btn:active{background:var(–amber);color:#000;border-color:var(–amber)}
.bs-save{width:100%;background:var(–amber);color:#000;border:none;border-radius:var(–r-sm);font-family:var(–font);font-size:16px;font-weight:800;padding:15px;cursor:pointer}

/* Fear & Greed badge colors */
.fg-extreme-fear{color:#FF4757}
.fg-fear{color:#FF7849}
.fg-neutral{color:#FFB800}

// ═══════════════════════════════════
// MATH
// ═══════════════════════════════════
function ema(closes,period){
  if(closes.length<period)return null;
  const k=2/(period+1);
  let e=closes.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<closes.length;i++)e=closes[i]*k+e*(1-k);
  return e;
}
function rsi(closes,period=14){
  if(closes.length<period+1)return 50;
  let g=0,l=0;
  for(let i=closes.length-period;i<closes.length;i++){const d=closes[i]-closes[i-1];d>0?g+=d:l-=d;}
  const ag=g/period,al=l/period;
  return al===0?100:100-100/(1+ag/al);
}
function macd(closes){
  const e12=ema(closes,12),e26=ema(closes,26);
  if(!e12||!e26)return{macd:0,sig:0,hist:0};
  const m=e12-e26,s=m*0.85;
  return{macd:m,sig:s,hist:m-s};
}
function bb(closes,period=20){
  if(closes.length<period)return null;
  const sl=closes.slice(-period),mean=sl.reduce((a,b)=>a+b,0)/period;
  const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/period);
  return{upper:mean+2*std,lower:mean-2*std,mid:mean,std};
}
function atr(highs,lows,closes,period=14){
  if(closes.length<period+1)return null;
  let trs=[];
  for(let i=closes.length-period;i<closes.length;i++)
    trs.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])));
  return trs.reduce((a,b)=>a+b,0)/period;
}
function adx(highs,lows,closes,period=14){
  if(closes.length<period+2)return{adx:15,dip:10,dim:10};
  let dmP=[],dmM=[],tr=[];
  for(let i=1;i<closes.length;i++){
    const um=highs[i]-highs[i-1],dm=lows[i-1]-lows[i];
    dmP.push(um>dm&&um>0?um:0);dmM.push(dm>um&&dm>0?dm:0);
    tr.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])));
  }
  const at=tr.slice(-period).reduce((a,b)=>a+b,0)/period;
  if(at===0)return{adx:15,dip:10,dim:10};
  const dip=(dmP.slice(-period).reduce((a,b)=>a+b,0)/period/at)*100;
  const dim=(dmM.slice(-period).reduce((a,b)=>a+b,0)/period/at)*100;
  return{adx:Math.abs(dip-dim)/(dip+dim+0.001)*100,dip,dim};
}
function volRatio(volumes){
  if(volumes.length<20)return 1;
  const avg=volumes.slice(-20).reduce((a,b)=>a+b,0)/20;
  return avg>0?volumes[volumes.length-1]/avg:1;
}

// ═══════════════════════════════════
// SCORING — broader, shows more signals
// ═══════════════════════════════════
function scoreIt(ind,price){
  let s=0;
  const {RSI,MACD,EMA9,EMA21,EMA50,BB,ADX,change,VOL}=ind;
  // RSI
  if(RSI<30)s+=3;else if(RSI<40)s+=2;else if(RSI<50)s+=1;
  else if(RSI>75)s-=3;else if(RSI>65)s-=2;else if(RSI>58)s-=1;
  // MACD
  if(MACD.hist>0&&MACD.macd>0)s+=2;else if(MACD.hist>0)s+=1;
  else if(MACD.hist<0&&MACD.macd<0)s-=2;else if(MACD.hist<0)s-=1;
  // EMA
  if(EMA9&&EMA21&&EMA50){
    if(price>EMA9&&EMA9>EMA21&&EMA21>EMA50)s+=3;
    else if(price>EMA21&&EMA21>EMA50)s+=2;
    else if(price>EMA50)s+=1;
    else if(price<EMA9&&EMA9<EMA21&&EMA21<EMA50)s-=3;
    else if(price<EMA21)s-=1;
  }
  // BB
  if(BB){
    if(price<=BB.lower)s+=2;else if(price<BB.mid)s+=1;
    else if(price>=BB.upper)s-=2;else if(price>BB.upper*0.98)s-=1;
  }
  // ADX
  if(ADX.adx>25&&ADX.dip>ADX.dim)s+=2;
  else if(ADX.adx>18&&ADX.dip>ADX.dim)s+=1;
  else if(ADX.adx>25&&ADX.dim>ADX.dip)s-=2;
  // Change
  if(change>3)s+=1;else if(change>1.5)s+=0.5;
  else if(change<-4)s-=1;else if(change<-2)s-=0.5;
  // Volume
  if(VOL>2)s+=1;else if(VOL>1.3)s+=0.5;else if(VOL<0.4)s-=1;
  return Math.round(Math.max(-13,Math.min(13,s)));
}

function getSignalType(score,mkt){
  if(mkt==='BEAR'){
    if(score<=-7)return'STRONG_SELL';
    if(score<=-3)return'SELL';
    if(score<=0)return'NEUTRAL';
    return'WATCH'; // even in bear show watches
  }
  if(score>=8)return'STRONG_BUY';
  if(score>=5)return'BUY';
  if(score>=2)return'NEUTRAL';
  if(score>=1)return'WATCH';
  if(score>=-3)return'NEUTRAL'; // show as neutral
  if(score>=-6)return'SELL';
  return'STRONG_SELL';
}

function adxLabel(v,dip,dim){if(v>25&&dip>dim)return{txt:'BULLISH',cls:'bull'};if(v>25&&dim>dip)return{txt:'BEARISH',cls:'bear'};return{txt:'RANGING',cls:'neutral'};}
function emaLabel(price,e9,e21,e50){if(!e9||!e21||!e50)return{txt:'—',cls:'neutral'};if(price>e9&&e9>e21&&e21>e50)return{txt:'BULLISH',cls:'bull'};if(price<e9&&e9<e21&&e21<e50)return{txt:'BEARISH',cls:'bear'};return{txt:'MIXED',cls:'neutral'};}
function volLabel(v){if(v>2)return{txt:'SURGE',cls:'bull'};if(v>1.3)return{txt:'HIGH',cls:'neutral'};if(v<0.5)return{txt:'LOW',cls:'bear'};return{txt:'NORMAL',cls:'neutral'};}
function bbLabel(price,b){if(!b)return{txt:'—',cls:'neutral'};if(price<=b.lower)return{txt:'OVERSOLD',cls:'bull'};if(price>=b.upper)return{txt:'OVERBOUGHT',cls:'bear'};if(price<b.mid)return{txt:'RANGE',cls:'neutral'};return{txt:'RANGE',cls:'neutral'};}

// ═══════════════════════════════════
// POSITION SIZING
// ═══════════════════════════════════
function calcPos(entry,sl,atrVal,h4ok){
  if(balance<=0||!entry||!sl)return{usdt:0,qty:0,maxLoss:0,profit:0,rr:0};
  const risk=balance*(riskPct/100);
  const rpc=Math.abs(entry-sl);
  if(rpc===0)return{usdt:0,qty:0,maxLoss:risk,profit:0,rr:0};
  let qty=risk/rpc;
  let usdt=qty*entry;
  const maxUsdt=balance*0.25;
  if(usdt>maxUsdt){usdt=maxUsdt;qty=usdt/entry;}
  if(usdt<1){usdt=1;qty=usdt/entry;}
  usdt=Math.round(usdt*100)/100;
  qty=Math.round(qty*10000)/10000;
  const maxLoss=qty*rpc;
  const tp=entry+(rpc*2.5); // default 2.5R
  const profit=qty*(tp-entry);
  const rr=rpc>0?(tp-entry)/rpc:0;
  return{usdt,qty,maxLoss,profit,rr:Math.round(rr*100)/100};
}

// ═══════════════════════════════════
// API
// ═══════════════════════════════════
const PROXY='https://api.allorigins.win/raw?url=';
function proxyUrl(url){return PROXY+encodeURIComponent(url);}

async function apiFetch(url){
  try{const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}
  catch(e){
    // fallback to proxy
    const r=await fetch(proxyUrl(url));if(!r.ok)throw new Error('Proxy fail');return await r.json();
  }
}

async function getBTC(){
  const d=await apiFetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=210');
  const closes=d.map(k=>parseFloat(k[4])),highs=d.map(k=>parseFloat(k[2])),lows=d.map(k=>parseFloat(k[3]));
  const price=closes[closes.length-1],e200=ema(closes,200),r=rsi(closes),a=adx(highs,lows,closes);
  let c=0;if(e200&&price>e200)c++;if(a.adx>18)c++;if(r>42)c++;
  return c===3?'BULL':c>=1?'NEUTRAL':'BEAR';
}

async function check4H(sym){
  try{
    const d=await apiFetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=4h&limit=60`);
    const closes=d.map(k=>parseFloat(k[4])),price=closes[closes.length-1],e50=ema(closes,50);
    return e50?price>e50:false;
  }catch(e){return false;}
}

async function fetchKlines(sym){
  const d=await apiFetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=1h&limit=60`);
  return{closes:d.map(k=>parseFloat(k[4])),highs:d.map(k=>parseFloat(k[2])),lows:d.map(k=>parseFloat(k[3])),volumes:d.map(k=>parseFloat(k[5]))};
}

async function fetch24h(){
  const syms=SYMBOLS.map(s=>`"${s}"`).join(',');
  const d=await apiFetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=[${syms}]`);
  const m={};d.forEach(t=>{m[t.symbol]=t;});return m;
}

// MAIN FETCH
// ═══════════════════════════════════
function setDot(type){
  const d=document.getElementById('liveDot');
  d.className='live-dot';
  if(type==='err')d.classList.add('err');
  else if(type==='upd')d.classList.add('upd');

async function fetchAll(){
  setDot('upd');
  try{
    step('Checking BTC trend...');
    marketStatus=await getBTC();
    updateBanner();

    step('Loading price data...');
    const[t24,...klines]=await Promise.all([fetch24h(),...SYMBOLS.map(s=>fetchKlines(s).catch(()=>null))]);

    step('Scoring '+ SYMBOLS.length +' coins...');
    const raw=[];
    for(let i=0;i<SYMBOLS.length;i++){
      const sym=SYMBOLS[i],k=klines[i];
      if(!k)continue;
      const{closes,highs,lows,volumes:vols}=k;
      const price=closes[closes.length-1];
      const t=t24[sym]||{},change=parseFloat(t.priceChangePercent)||0;
      const vr=volRatio(vols);
      if(vr<0.1)continue; // very low volume only
      const RSI=rsi(closes),MACD=macd(closes),EMA9=ema(closes,9),EMA21=ema(closes,21),EMA50=ema(closes,50),BB=bb(closes),ATR=atr(highs,lows,closes)||price*0.015,ADX=adx(highs,lows,closes),VOL=vr;
      const ind={RSI,MACD,EMA9,EMA21,EMA50,BB,ATR,ADX,change,VOL};
      const score=scoreIt(ind,price);
      const signal=getSignalType(score,marketStatus);
      const sl=price-ATR*1.5,tp=price+ATR*(score>=8?3.5:score>=5?3.0:2.5),buyAt=price-ATR*0.2;
      const rr=sl>0?((tp-buyAt)/(buyAt-sl)):0;
      raw.push({sym,price,change,score,signal,sl,tp,buyAt,ATR,ind,rr:Math.round(rr*100)/100});
    }

    step('Checking 4H confirmations...');
    const h4=await Promise.all(raw.map(s=>check4H(s.sym)));

    signals=raw.map((s,i)=>{
      const pos=calcPos(s.buyAt,s.sl,s.ATR,h4[i]);
      return{...s,h4ok:h4[i],pos};
    });
    signals.sort((a,b)=>b.score-a.score);

    updateCounts();
    renderSignals();
    document.getElementById('countStrip').style.display='flex';
    document.getElementById('updTime').textContent=new Date().toLocaleTimeString();
    document.getElementById('pullHint').textContent='Pull down to refresh ↓';
    setDot('live');
    lastRefresh=Date.now();
    startCountdown();
  }catch(e){
    setDot('err');
    showError(e.message||'Network error');
    console.error(e);
  }
}

function step(t){const el=document.getElementById('loadStep');if(el)el.textContent=t;}

function updateBanner(){
  const el=document.getElementById('mktBanner');
  el.style.display='flex';
  if(marketStatus==='BULL'){el.className='mkt-banner mb-bull';el.innerHTML='🟢 Bull Market — All signals active';}
  else if(marketStatus==='NEUTRAL'){el.className='mkt-banner mb-neutral';el.innerHTML='🟡 Neutral Market — Be selective';}
  else{el.className='mkt-banner mb-bear';el.innerHTML='🔴 Bear Market — Short bias or wait';}
}

function updateCounts(){
  const byType=t=>signals.filter(s=>s.signal===t).length;
  document.getElementById('cnt-all').textContent=signals.length;
  document.getElementById('cnt-sb').textContent=byType('STRONG_BUY');
  document.getElementById('cnt-buy').textContent=byType('BUY');
  document.getElementById('cnt-neu').textContent=byType('NEUTRAL');
  document.getElementById('cnt-sell').textContent=byType('SELL')+byType('STRONG_SELL');
  document.getElementById('cnt-watch').textContent=byType('WATCH');
}

function showError(msg){
  document.getElementById('signalsList').innerHTML=`
  <div class="error-box">
    <div class="err-title">⚠️ Connection Error</div>
    <div class="err-sub">Could not reach Binance API.<br>Check your internet connection.<br><small style="color:var(--text3)">${msg}</small></div>
    <button class="retry-btn" onclick="retryFetch()">🔄 Retry Now</button>
  </div>`;
}
function retryFetch(){
  document.getElementById('signalsList').innerHTML=`<div class="loading-state"><div class="loader"></div><div class="load-title">Retrying...</div><div class="load-sub" id="loadStep">Connecting...</div></div>`;
  fetchAll();
}

function startCountdown(){
  clearInterval(countdownTimer);countdown=30;
  countdownTimer=setInterval(()=>{
    countdown--;
    document.getElementById('updTimer').textContent=`Refreshing in ${countdown}s`;
    if(countdown<=0){clearInterval(countdownTimer);if(document.visibilityState==='visible')fetchAll();}
  },1000);
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function fmtP(p){
  if(!p&&p!==0)return'—';
  if(p>=1000)return'$'+p.toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:1});
  if(p>=1)return'$'+p.toFixed(4);
  if(p>=0.01)return'$'+p.toFixed(6);
  return'$'+p.toFixed(8);
}

function renderSignals(){
  const list=document.getElementById('signalsList');
  let filtered=currentFilter==='ALL'?signals:signals.filter(s=>{
    if(currentFilter==='SELL')return s.signal==='SELL'||s.signal==='STRONG_SELL';
    return s.signal===currentFilter;
  });
  if(filtered.length===0){list.innerHTML='<div class="empty-state">No '+currentFilter.replace('_',' ')+' signals right now</div>';return;}

  // Group by type for ALL view
  if(currentFilter==='ALL'){
    let html='';
    const groups=[
      {key:'STRONG_BUY',label:'🔥 STRONG BUY'},
      {key:'BUY',label:'✅ BUY SIGNALS'},
      {key:'NEUTRAL',label:'⚪ NEUTRAL'},
      {key:'WATCH',label:'👀 WATCH LIST'},
      {key:'SELL',label:'🔴 SELL SIGNALS'},
    ];
    for(const g of groups){
      const items=filtered.filter(s=>s.signal===g.key||(g.key==='SELL'&&s.signal==='STRONG_SELL'));
      if(!items.length)continue;
      html+=`<div class="sec-lbl"><div class="sec-line"></div><div class="sec-txt">${g.label} · ${items.length}</div><div class="sec-line"></div></div>`;
      html+=items.map(s=>renderCard(s)).join('');
    }
    list.innerHTML=html;
  }else{
    list.innerHTML=filtered.map(s=>renderCard(s)).join('');
  }
}

function renderCard(s){
  const sig=s.signal;
  const isSB=sig==='STRONG_BUY',isBuy=sig==='BUY',isSell=sig==='SELL'||sig==='STRONG_SELL',isWatch=sig==='WATCH';
  const cardCls=isSB?'sb':isBuy?'buy':isSell?'sell':isWatch?'watch':'neu';
  const badgeCls=isSB?'b-sb':isBuy?'b-buy':isSell?'b-sell':isWatch?'b-watch':'b-neu';
  const badgeTxt=isSB?'STRONG BUY':isBuy?'BUY':sig==='STRONG_SELL'?'STRONG SELL':isSell?'SELL':isWatch?'WATCH':'NEUTRAL';
  const chgCls=s.change>0?'chg-p':s.change<0?'chg-n':'chg-z';
  const chgStr=(s.change>=0?'+':'')+s.change.toFixed(2)+'%';

  // Indicator tags
  const RSI=s.ind.RSI,ADX=s.ind.ADX,VOL=s.ind.VOL,BB=s.ind.BB;
  const rsiL=rsiLabel(RSI);
  const adxL=adxLabel(ADX.adx,ADX.dip,ADX.dim);
  const emaL=emaLabel(s.price,s.ind.EMA9,s.ind.EMA21,s.ind.EMA50);
  const volL=volLabel(VOL);
  const bbL=bbLabel(s.price,BB);

  // Position calc
  const p=s.pos;
  const hasPos=balance>0&&p.usdt>0;
  const riskAmt=balance>0?balance*(riskPct/100):0;
  const riskBarPct=balance>0?Math.min(100,(p.usdt/balance)*100):30;

  const idx=signals.indexOf(s);

  return`
  <div class="sig-card ${cardCls}" id="card-${idx}">
    <div class="card-hd">
      <div class="coin-block">
        <div class="coin-sym">${s.sym.replace('USDT','')}<span>/USDT</span></div>
        <div class="coin-price">${fmtP(s.price)}</div>
        <div class="coin-chg ${chgCls}">${chgStr} 24h</div>
      </div>
      <div class="card-right">
        <div class="sig-badge ${badgeCls}">${badgeTxt}</div><br>
        <span class="score-badge">Score: ${s.score}</span>
        ${s.h4ok?'<br><span style="font-size:10px;color:var(--green);font-weight:700">✅ 4H</span>':'<br><span style="font-size:10px;color:var(--amber);font-weight:700">⚠️ NO 4H</span>'}
      </div>
    </div>

    <div class="ind-row">
      <div class="ind-tag ${rsiL.cls}"><span class="ind-key">RSI</span><span class="ind-val">${RSI.toFixed(1)}</span></div>
      <div class="ind-tag ${adxL.cls}"><span class="ind-key">ADX</span><span class="ind-val">${ADX.adx.toFixed(1)}</span></div>
      <div class="ind-tag ${emaL.cls}"><span class="ind-key">EMA</span><span class="ind-val">${emaL.txt}</span></div>
      <div class="ind-tag ${volL.cls}"><span class="ind-key">VOL</span><span class="ind-val">${volL.txt}</span></div>
      <div class="ind-tag ${bbL.cls}"><span class="ind-key">BB</span><span class="ind-val">${bbL.txt}</span></div>
      ${s.h4ok?'<div class="ind-tag bull"><span class="ind-val">4H ✅</span></div>':''}
    </div>

    <div class="cd"></div>
    <div class="price-row">
      <div class="pr-cell"><div class="pr-lbl">Stop Loss</div><div class="pr-val pr-sl">${fmtP(s.sl)}</div></div>
      <div class="pr-cell"><div class="pr-lbl">Take Profit</div><div class="pr-val pr-tp">${fmtP(s.tp)}</div></div>
      <div class="pr-cell"><div class="pr-lbl">R:R</div><div class="pr-val pr-rr">${s.rr}x</div></div>
      <div class="pr-cell"><div class="pr-lbl">Buy At</div><div class="pr-val pr-now">${fmtP(s.buyAt)}</div></div>
    </div>

    <div class="pos-calc">
      <div class="pos-calc-title">⚖️ POSITION SIZE CALCULATOR</div>
      ${balance>0?`
      <div class="pos-grid">
        <div class="pos-box"><div class="pos-box-lbl">Buy Amount</div><div class="pos-box-val blue">$${p.usdt.toFixed(2)}</div></div>
        <div class="pos-box"><div class="pos-box-lbl">Qty (Coins)</div><div class="pos-box-val">${p.qty.toFixed(4)}</div></div>
        <div class="pos-box"><div class="pos-box-lbl">Max Loss</div><div class="pos-box-val red">-$${p.maxLoss.toFixed(2)}</div></div>
        <div class="pos-box"><div class="pos-box-lbl">Expected Profit</div><div class="pos-box-val green">+$${p.profit.toFixed(2)}</div></div>
      </div>
      <div class="risk-bar-wrap">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:10px;color:var(--text3);font-weight:600">Risk per trade</span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--amber);font-weight:700">${riskPct}% = $${riskAmt.toFixed(2)}</span>
        </div>
        <div class="risk-bar-track"><div class="risk-bar-fill" style="width:${riskBarPct}%"></div></div>
      </div>
      `:`<div style="text-align:center;padding:10px 0;font-size:12px;color:var(--text3)">Tap balance above to calculate position sizes</div>`}
    </div>

    <div class="card-acts">
      <button class="btn-track" onclick="openTrade(${idx})">📝 Track Trade</button>
      <a class="btn-binance" href="https://www.binance.com/en/trade/${s.sym.replace('USDT','')}_USDT" target="_blank">🔗 Binance</a>
    </div>
  </div>`;
}

// ═══════════════════════════════════
// TRADE TRACKER
// ═══════════════════════════════════
function openTrade(i){
  const s=signals[i]; if(!s)return;
  if(balance<=0){openBalSheet();return;}
  const p=s.pos;
  const trade={
    id:Date.now(),sym:s.sym,signal:s.signal,score:s.score,
    entryPrice:s.buyAt,takeProfit:s.tp,stopLoss:s.sl,
    enterUSDT:p.usdt||1,positionSize:p.qty||(1/s.buyAt),
    profit:p.profit,h4ok:s.h4ok,status:'OPEN',
    closePrice:null,actualPnL:null,
    timestamp:new Date().toISOString()
  };
  updateBalLive(-trade.enterUSDT);
  trades.unshift(trade);saveState();renderTracker();renderStats();switchTab('tracker');
}

function renderTracker(){
  const list=document.getElementById('trackerList');
  if(!trades.length){list.innerHTML='<div class="empty-state">No trades yet.<br>Tap <strong>Track Trade</strong> on any signal.</div>';return;}
  list.innerHTML=trades.map(t=>{
    const pnlCls=t.actualPnL===null?'pnl-z':t.actualPnL>=0?'pnl-p':'pnl-n';
    const pnlStr=t.actualPnL!==null?(t.actualPnL>=0?'+':'')+' $'+Math.abs(t.actualPnL).toFixed(2):'Open';
    const dt=new Date(t.timestamp).toLocaleDateString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    return`
    <div class="tr-card">
      <div class="tr-hd">
        <div>
          <div class="tr-coin">${t.sym.replace('USDT','')}/USDT <span style="font-size:10px;color:var(--text3)">${t.h4ok?'✅ 4H':''} · Score ${t.score}</span></div>
          <div class="tr-meta">${dt}</div>
        </div>
        <div class="tr-status st-${t.status}">${t.status}</div>
      </div>
      <div class="tr-grid">
        <div class="tr-cell"><div class="tr-lbl">Entry</div><div class="tr-val">${fmtP(t.entryPrice)}</div></div>
        <div class="tr-cell"><div class="tr-lbl">Target</div><div class="tr-val" style="color:var(--green)">${fmtP(t.takeProfit)}</div></div>
        <div class="tr-cell"><div class="tr-lbl">Stop</div><div class="tr-val" style="color:var(--red)">${fmtP(t.stopLoss)}</div></div>
      </div>
      <div class="tr-foot">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:3px">Entered $${t.enterUSDT?.toFixed(2)} · Est +$${t.profit?.toFixed(2)||'—'}</div>
          <div class="tr-pnl ${pnlCls}">${pnlStr}</div>
        </div>
        <div class="tr-acts">
          ${t.status==='OPEN'?`<button class="btn-cl" onclick="openCloseModal(${t.id})">Close</button>`:''}
          <button class="btn-dl" onclick="delTrade(${t.id})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openCloseModal(id){
  activeTradeId=id;
  const t=trades.find(x=>x.id===id);if(!t)return;
  document.getElementById('mCoin').textContent=t.sym.replace('USDT','/USDT');
  document.getElementById('mSub').textContent=`Entry ${fmtP(t.entryPrice)} · Target ${fmtP(t.takeProfit)}`;
  document.getElementById('mPrice').value='';
  document.getElementById('mPnlVal').textContent='—';
  document.getElementById('mPnlVal').style.color='var(--text3)';
  document.getElementById('closeModal').classList.add('open');
}
function calcMPnl(){
  const t=trades.find(x=>x.id===activeTradeId);if(!t)return;
  const cp=parseFloat(document.getElementById('mPrice').value);if(isNaN(cp))return;
  const pnl=(cp-t.entryPrice)*t.positionSize;
  const el=document.getElementById('mPnlVal');
  el.textContent=(pnl>=0?'+':'')+' $'+Math.abs(pnl).toFixed(2);
  el.style.color=pnl>=0?'var(--green)':'var(--red)';
}
function confirmClose(outcome){
  const t=trades.find(x=>x.id===activeTradeId);if(!t)return;
  const cp=parseFloat(document.getElementById('mPrice').value);
  t.closePrice=isNaN(cp)?(outcome==='WIN'?t.takeProfit:t.stopLoss):cp;
  t.actualPnL=(t.closePrice-t.entryPrice)*t.positionSize;
  t.outcome=outcome;t.status=outcome;
  updateBalLive(t.actualPnL+t.enterUSDT);
  saveState();closeModal();renderTracker();renderStats();
}
function closeModal(){document.getElementById('closeModal').classList.remove('open');activeTradeId=null;}
function delTrade(id){trades=trades.filter(t=>t.id!==id);saveState();renderTracker();renderStats();}

// ═══════════════════════════════════
// STATS
// ═══════════════════════════════════
function renderStats(){
  const c=document.getElementById('statsWrap');
  const closed=trades.filter(t=>t.status!=='OPEN'),open=trades.filter(t=>t.status==='OPEN');
  const wins=trades.filter(t=>t.status==='WIN'),losses=trades.filter(t=>t.status==='LOSS');
  const totalPnL=closed.reduce((a,t)=>a+(t.actualPnL||0),0);
  const wr=closed.length?(wins.length/closed.length*100):0;
  const avg=closed.length?totalPnL/closed.length:0;
  const best=wins.length?Math.max(...wins.map(t=>t.actualPnL||0)):null;
  const worst=losses.length?Math.min(...losses.map(t=>t.actualPnL||0)):null;
  const pnlColor=totalPnL>=0?'var(--green)':'var(--red)';
  c.innerHTML=`
  <div class="hero-stat">
    <div class="hs-lbl">Total Performance</div>
    <div class="hs-pnl" style="color:${pnlColor}">${totalPnL>=0?'+':''}$${Math.abs(totalPnL).toFixed(2)}</div>
    <div class="wr-row"><span class="wr-lbl">Win Rate</span><span class="wr-val">${wr.toFixed(0)}%</span></div>
    <div class="wr-track"><div class="wr-fill" style="width:${Math.min(wr,100)}%"></div></div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-box-val" style="color:var(--green)">${wins.length}</div><div class="stat-box-lbl">WINS ✅</div></div>
      <div class="stat-box"><div class="stat-box-val" style="color:var(--red)">${losses.length}</div><div class="stat-box-lbl">LOSSES ❌</div></div>
      <div class="stat-box"><div class="stat-box-val" style="color:var(--amber)">${open.length}</div><div class="stat-box-lbl">OPEN 🟡</div></div>
    </div>
  </div>
  <div class="info-card">
    <div class="ic-title">Trade Breakdown</div>
    <div class="ic-row"><span class="ic-lbl">Total Trades</span><span class="ic-val">${trades.length}</span></div>
    <div class="ic-row"><span class="ic-lbl">Avg Profit</span><span class="ic-val" style="color:${avg>=0?'var(--green)':'var(--red)'}">${avg>=0?'+':''}$${Math.abs(avg).toFixed(2)}</span></div>
    <div class="ic-row"><span class="ic-lbl">Best Trade 🏆</span><span class="ic-val" style="color:var(--green)">${best!==null?'+$'+best.toFixed(2):'—'}</span></div>
    <div class="ic-row"><span class="ic-lbl">Worst Trade</span><span class="ic-val" style="color:var(--red)">${worst!==null?'−$'+Math.abs(worst).toFixed(2):'—'}</span></div>
    <div class="ic-row"><span class="ic-lbl">Current Balance</span><span class="ic-val" style="color:var(--amber)">$${balance.toFixed(2)}</span></div>
    <div class="ic-row"><span class="ic-lbl">Risk per Trade</span><span class="ic-val" style="color:var(--amber)">${riskPct}% = $${(balance*riskPct/100).toFixed(2)}</span></div>
  </div>
  <div class="rules-card">
    <div class="rc-title">⚡ Golden Rules</div>
    ${['Only size up on STRONG BUY with 4H confirmed','Always honor your Stop Loss — no exceptions','Never average down on a losing position','Take profit at target — greed kills accounts','Use 1-2% risk per trade when starting out','Track every trade to spot patterns'].map((r,i)=>`<div class="rule-item"><span class="rule-n">${i+1}</span><span>${r}</span></div>`).join('')}
  </div>
  ${trades.length?'<button class="clear-btn" onclick="clearHistory()">🗑 Clear All Trade History</button>':''}`;
}

function clearHistory(){if(confirm('Clear all trade history?')){trades=[];saveState();renderTracker();renderStats();}}

// ═══════════════════════════════════
// NAV
// ═══════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='tracker')renderTracker();
  if(tab==='stats')renderStats();
}
function setFilter(el){
  document.querySelectorAll('.count-chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentFilter=el.dataset.f;
  renderSignals();
}

// Auto refresh
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&Date.now()-lastRefresh>30000)fetchAll();
});

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
loadState();renderTracker();renderStats();
fetchFG();
fetchAll();
</script>
